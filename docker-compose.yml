services:
  db:
    image: postgres:18
    container_name: sensor-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sensor_data
      POSTGRES_USER: sensor_user
      POSTGRES_PASSWORD: sensor_pass
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql

volumes:
  pgdata: